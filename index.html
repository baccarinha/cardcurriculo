<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Card Neon</title>

<style>
body {
  background: #0a0a0a;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* CARD */
.card {
  width: 320px;
  padding: 25px;
  border-radius: 20px;
  background: rgba(20, 20, 30, 0.8);
  backdrop-filter: blur(10px);
  text-align: center;
  color: #fff;

  /* NEON EFFECT */
  border: 2px solid #ff00ff;
  box-shadow:
    0 0 10px #ff00ff,
    0 0 20px #ff00ff,
    0 0 40px #ff00ff;
}

/* FOTO */
.card img {
  width: 120px;
  border-radius: 50%;
  border: 3px solid #00ffff;
  box-shadow: 0 0 15px #00ffff;
}

/* NOME */
.card h2 {
  margin: 15px 0 5px;
  color: #ff00ff;
  text-shadow: 0 0 10px #ff00ff;
}

/* PROFISSÃO */
.card p {
  color: #ccc;
}

/* BOTÕES */
.btn {
  display: inline-block;
  margin: 10px 5px;
  padding: 10px 15px;
  border-radius: 10px;
  color: white;
  text-decoration: none;
  border: 2px solid #00ffff;

  box-shadow: 0 0 10px #00ffff;
  transition: 0.3s;
}

.btn:hover {
  background: #00ffff;
  color: #000;
  box-shadow: 0 0 20px #00ffff, 0 0 40px #00ffff;
}
</style>
</head>

<body>

<div class="card">
  <img src="https://via.placeholder.com/120" alt="Foto">

  <h2>Seu Nome</h2>
  <p>Desenvolvedor Front-End</p>

  <a href="#" class="btn">LinkedIn</a>
  <a href="#" class="btn">GitHub</a>
</div>

</body>
</html>
