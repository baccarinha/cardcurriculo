<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Profissional</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- Font Awesome (ícones reais) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

  <div class="card">

    <!-- TOPO -->
    <div class="topo"></div>

    <!-- FOTO -->
    <div class="foto-container">
      <img src="121.jpg" alt="Foto de Jéssica" class="foto">
    </div>

    <!-- CONTEÚDO -->
    <div class="conteudo">

      <h2>Jéssica Thais Baccaro</h2>

      <p class="area">
        TI • Auxiliar de Auto Atendimento
      </p>

      <p class="descricao">
        Atuar e crescer profissionalmente na empresa, contribuindo com minha experiência em atendimento e minha paixão por tecnologia.
      </p>

      <!-- INFORMAÇÕES -->
      <div class="infos">
        <div class="box">
          <i class="fa-solid fa-location-dot"></i> Jundiaí
        </div>

        <div class="box">
          <i class="fa-solid fa-graduation-cap"></i> ADS
        </div>

        <div class="box">
          <i class="fa-solid fa-envelope"></i> Email
        </div>

        <div class="box">
          <i class="fa-solid fa-laptop-code"></i> TI
        </div>
      </div>

      <!-- BOTÕES -->
      <div class="botoes">

        <a href="curriculo.pdf" target="_blank" class="btn verde">
          <i class="fa-solid fa-file-pdf"></i> Currículo
        </a>

        <a href="mailto:jtbaccaro.jb@gmail.com" class="btn cinza">
          <i class="fa-solid fa-envelope"></i> Email
        </a>

      </div>

    </div>

  </div>

</body>
</html>
